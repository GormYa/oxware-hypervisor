# OXware Hypervisor — systemd Security Hardening Drop-in
# Install: sudo mkdir -p /etc/systemd/system/oxware.service.d/
#          sudo cp kernel/systemd/oxware-hardening.conf /etc/systemd/system/oxware.service.d/
#          sudo systemctl daemon-reload && sudo systemctl restart oxware

[Service]

# ── Capabilities: drop everything except what KVM/libvirt needs ───────────
CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_RAW CAP_SYS_PTRACE CAP_DAC_OVERRIDE CAP_DAC_READ_SEARCH CAP_SYS_ADMIN CAP_KILL CAP_FOWNER CAP_FSETID CAP_SETUID CAP_SETGID CAP_NET_BIND_SERVICE
AmbientCapabilities=CAP_NET_ADMIN CAP_NET_RAW CAP_SYS_PTRACE CAP_DAC_OVERRIDE CAP_SYS_ADMIN

# ── No new privileges (prevent setuid escalation) ─────────────────────────
# NOTE: Keep false for now — libvirt helpers may need privilege escalation.
# Set to true once verified all qemu helpers work without it.
NoNewPrivileges=false

# ── Filesystem namespaces ─────────────────────────────────────────────────
# PrivateTmp: isolated /tmp — prevents /tmp race attacks
PrivateTmp=true

# ProtectSystem: make /usr, /boot, /efi read-only
ProtectSystem=strict

# Allow-list writable paths (override ProtectSystem=strict)
ReadWritePaths=/etc/oxware /var/lib/oxware /var/log/oxware /var/lib/libvirt /run/libvirt /var/run/libvirt /tmp /dev/shm /var/lib/swtpm /run/oxware

# ProtectHome: block access to /home and /root (oxware doesn't need them)
ProtectHome=read-only

# ── Device access ─────────────────────────────────────────────────────────
# Allow only KVM, tun/tap, random devices
DevicePolicy=closed
DeviceAllow=/dev/kvm rw
DeviceAllow=/dev/net/tun rw
DeviceAllow=/dev/vhost-net rw
DeviceAllow=/dev/urandom r
DeviceAllow=/dev/random r
DeviceAllow=/dev/null rw
DeviceAllow=/dev/zero rw
DeviceAllow=/dev/ptmx rw
DeviceAllow=char-* r
DeviceAllow=block-* r

# ── Process namespaces ────────────────────────────────────────────────────
# ProtectKernelTunables: /proc/sys, /sys read-only (nftables needs some writes)
ProtectKernelTunables=false

# ProtectKernelModules: prevent module load/unload from app
ProtectKernelModules=true

# ProtectKernelLogs: prevent dmesg read from app
ProtectKernelLogs=false

# ProtectClock: prevent system clock modification
ProtectClock=true

# ProtectControlGroups: block cgroup writes from app
ProtectControlGroups=false

# ── Memory hardening ──────────────────────────────────────────────────────
# LockPersonality: prevent personality() syscall (execution domain changes)
LockPersonality=true

# MemoryDenyWriteExecute: block W^X — BUT Python JIT needs this OFF
# Set to true only when using PyPy or AOT compilation
MemoryDenyWriteExecute=false

# RestrictRealtime: prevent RT scheduling (DoS prevention)
RestrictRealtime=true

# RestrictSUIDSGID: prevent SUID/SGID file creation
RestrictSUIDSGID=true

# ── Address families ──────────────────────────────────────────────────────
# Only allow necessary socket families
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX AF_NETLINK AF_PACKET

# ── Syscall filtering (seccomp) ───────────────────────────────────────────
# Whitelist syscall groups needed by Python + libvirt + KVM
SystemCallFilter=@system-service @network-io @file-system @process @io-event @ipc @basic-io @signal
SystemCallFilter=~@clock @cpu-emulation @debug @module @mount @obsolete @privileged @raw-io @reboot @swap

# Allow specific syscalls needed by KVM/libvirt/Python
SystemCallFilter=ptrace perf_event_open bpf io_uring_setup io_uring_enter userfaultfd

# On violation: kill the process (SIGKILL) instead of EPERM
SystemCallErrorNumber=EPERM

# ── Resource limits ───────────────────────────────────────────────────────
# Prevent fork bomb
LimitNPROC=4096
# Prevent memory exhaustion
LimitAS=infinity
LimitRSS=infinity
# Max open files (libvirt needs many)
LimitNOFILE=65536
# Max core dump size (disable in production)
LimitCORE=0

# ── cgroups v2 resource control ───────────────────────────────────────────
# CPU: max 80% of one core for oxware process itself (not VMs)
CPUQuota=800%
# Memory: limit oxware daemon (not VMs — VMs use their own cgroups)
MemoryMax=4G
MemorySwapMax=0
# IO weight (lower = less priority when under contention)
IOWeight=50

# ── Misc ──────────────────────────────────────────────────────────────────
# UMask: new files created 0640 by default
UMask=0027
# Remove IPC on exit
RemoveIPC=true
