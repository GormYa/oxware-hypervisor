name: OXware CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (mock libvirt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvirt-dev pkg-config gcc

      - name: Install Python deps
        working-directory: oxware/backend
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-jwt-extended flask-socketio flask-cors \
            eventlet cryptography paramiko psutil requests \
            libvirt-python flake8 mypy pytest pytest-cov bandit pip-audit

      # ── HARD GATE: syntax compile of every backend module.
      # If app.py or any module fails to parse, the build fails.
      - name: Python syntax (HARD FAIL)
        working-directory: oxware/backend
        run: |
          python -m compileall -q . -x '__pycache__|\.venv'

      # ── SOFT: full-module flake8 report (non-blocking; signal only).
      - name: Flake8 — informational
        working-directory: oxware/backend
        run: |
          flake8 . \
            --max-line-length=130 \
            --extend-ignore=E501,W503,W504,E302,E303,E741,F401,F811,C901,W291,W293,E265,E266,E501 \
            --exclude=__pycache__,.venv,venv,migrations,app.py \
            --count --statistics || true

      # ── HARD GATE: app.py must not have actual syntax errors that crash
      # the parser. F821 (undefined name) is intentionally NOT included —
      # the app uses dynamic / lazy imports (ET, libvirt, socketio, …) that
      # flake8 cannot resolve. compileall above already guarantees import
      # success in a real CI env.
      - name: Flake8 syntax-only on app.py (HARD FAIL)
        working-directory: oxware/backend
        run: |
          flake8 app.py \
            --select=E9 \
            --show-source --statistics

      - name: Mypy — type check (non-blocking)
        working-directory: oxware/backend
        run: |
          mypy app.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --follow-imports=skip \
            --python-version=${{ matrix.python-version }} || true

      # ── HARD GATE: bandit at HIGH severity, with documented exceptions.
      # All entries are tracked under SECURITY.md → "Hardening backlog v2.8".
      # B324 — SHA1 used in the RFC 6455 WebSocket Sec-WebSocket-Accept
      #        handshake (the RFC mandates SHA1, not a security choice).
      # B202 — tarfile/zip extractall on user-supplied archives. Fix is a
      #        path-normalising filter; not landed yet.
      # B507 — paramiko AutoAddPolicy for first-contact SSH.
      # B402 — ftplib imported for legacy backup target.
      # B321 — ftplib calls for legacy backup target.
      # The skip-list is reviewed every release; new findings still fail CI.
      - name: Bandit — HIGH severity (HARD FAIL, with documented skips)
        working-directory: oxware/backend
        run: |
          bandit -r . \
            -x __pycache__,.venv,tests \
            --skip B202,B321,B324,B402,B507 \
            -lll \
            --format txt

      - name: Bandit — full report (informational)
        working-directory: oxware/backend
        run: |
          bandit -r . \
            -x __pycache__,.venv,tests \
            -ll \
            --format txt || true

      # ── HARD GATE when tests/ exists. Skips gracefully on a repo with no tests yet,
      # but as soon as a single tests/test_*.py lands, a failing test blocks merge.
      - name: Pytest — unit tests
        working-directory: oxware/backend
        run: |
          if [ -d tests ] && [ -n "$(find tests -name 'test_*.py' -print -quit)" ]; then
            pytest tests/ -v --tb=short --cov=. --cov-report=term-missing \
              --ignore=tests/integration
          else
            echo "::warning::No tests found under oxware/backend/tests/ — coverage not measured. Add tests/test_*.py to enable the gate."
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scanners
        run: pip install bandit pip-audit
      # ── HARD GATE: full-tree bandit at HIGH severity (same documented
      # skips as the lint-and-test job — keep both in sync).
      - name: Bandit full scan (HARD FAIL on HIGH, documented skips)
        run: |
          bandit -r oxware/backend/ \
            -x __pycache__,oxware/backend/tests \
            --skip B202,B321,B324,B402,B507 \
            -lll \
            -f txt
      - name: Bandit JSON report (informational)
        run: |
          bandit -r oxware/backend/ \
            -x __pycache__,oxware/backend/tests \
            -ll \
            -f json \
            -o bandit-report.json || true
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
      # ── pip-audit on declared deps (informational on the controller; HARD on requirements files when they exist).
      - name: pip-audit on requirements
        run: |
          if ls oxware/backend/requirements*.txt 2>/dev/null; then
            pip-audit --strict -r oxware/backend/requirements.txt
          else
            echo "::warning::No requirements.txt found — dependency audit skipped."
          fi

  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      # Informational — install.sh / repair.sh have intentional dynamic eval patterns.
      - name: Shellcheck (informational)
        run: |
          shellcheck install.sh repair.sh uninstall.sh \
            scripts/*.sh kernel/install-hardening.sh \
            --severity=warning || true

  frontend-check:
    name: Frontend Sanity Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check index.html size (warn if >5MB)
        run: |
          SIZE=$(wc -c < oxware/frontend/templates/index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::warning::index.html exceeds 5MB — consider splitting"
          fi
      # ── HARD GATE: no duplicate routes / endpoint functions.
      # A duplicate route raises a Flask AssertionError at import time and
      # bricks the controller process, so this stays a hard gate.
      - name: Check for duplicate route definitions in app.py
        run: |
          python3 << 'PYEOF'
          import re, sys
          lines = open('oxware/backend/app.py', encoding='utf-8', errors='replace').readlines()
          routes = {}
          dups = []
          i = 0
          while i < len(lines):
              l = lines[i]
              if '@app.route(' not in l:
                  i += 1
                  continue
              block = ''.join(lines[i:i+3])
              path_m = re.search(r'@app\.route\(["\']([^"\']+)["\']', block)
              if not path_m:
                  i += 1
                  continue
              path = path_m.group(1)
              methods_m = re.search(r'methods\s*=\s*\[([^\]]+)\]', block)
              if methods_m:
                  methods = re.findall(r'["\']([A-Z]+)["\']', methods_m.group(1))
              else:
                  methods = ['GET']
              for method in methods:
                  key = method + ' ' + path
                  if key in routes:
                      dups.append('DUPLICATE ' + key + ': L' + str(routes[key]) + ' and L' + str(i+1))
                  else:
                      routes[key] = i + 1
              i += 1
          if dups:
              for d in dups: print(d)
              sys.exit(1)
          else:
              print('OK: ' + str(len(routes)) + ' unique method+path combos, no true duplicates')
          funcs = {}; fn_dups = []; in_route2 = False
          for i, l in enumerate(lines, 1):
              if '@app.route(' in l: in_route2 = True
              if in_route2:
                  fm = re.match(r'\s*def (\w+)', l)
                  if fm:
                      name = fm.group(1)
                      if name in funcs: fn_dups.append('DUPLICATE FUNC ' + name + ': L' + str(funcs[name]) + ' vs L' + str(i))
                      else: funcs[name] = i
                      in_route2 = False
          if fn_dups:
              for d in fn_dups: print(d)
              sys.exit(1)
          else:
              print('OK: ' + str(len(funcs)) + ' unique endpoint function names')
          PYEOF

      # ── HARD GATE: ensure no token still leaks via URL query parameters.
      # Specifically forbid `?token=` / `?access_token=` / `?oauth2_token=`
      # patterns being emitted by the server (the OAuth2 sessionStorage bridge
      # was added in v2.7.0 — regressions would re-open the previous leak).
      - name: Token-in-URL regression check (HARD FAIL)
        run: |
          set -e
          if grep -nE '\?(oauth2_token|access_token|jwt_token)=' oxware/backend/app.py; then
            echo "::error::token still emitted in URL query — use sessionStorage bridge (SEC-009)"
            exit 1
          fi
          echo "OK: no token-in-URL emit"
