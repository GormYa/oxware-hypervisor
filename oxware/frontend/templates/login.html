<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OXware Hypervisor – Giriş</title>
  <link rel="icon" type="image/png" href="/static/img/sadeceikon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0d2340 0%, #0f3460 35%, #1a5276 65%, #1f618d 100%);
      z-index: 0;
    }

    /* Geometric diamond shapes like ESXi */
    .geo {
      position: absolute;
      opacity: 0.12;
    }
    .geo-1 {
      width: 420px; height: 420px;
      background: #5dade2;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: -80px; right: 20%;
    }
    .geo-2 {
      width: 280px; height: 280px;
      background: #85c1e9;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: 180px; right: 28%;
      opacity: 0.08;
    }
    .geo-3 {
      width: 520px; height: 520px;
      background: #2e86c1;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      bottom: -160px; right: 8%;
      opacity: 0.15;
    }
    .geo-4 {
      width: 200px; height: 200px;
      background: #aed6f1;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: 55%; right: 42%;
      opacity: 0.06;
    }
    .geo-5 {
      width: 160px; height: 160px;
      background: #5dade2;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      bottom: 12%; left: 52%;
      opacity: 0.09;
    }

    /* ── Layout: left form | right brand ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Left: form panel */
    .left-panel {
      width: 400px;
      min-width: 360px;
      background: rgba(8, 20, 35, 0.72);
      backdrop-filter: blur(2px);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 0 52px;
      justify-content: center;
    }

    .brand-top {
      position: absolute;
      top: 28px;
      left: 32px;
    }

    .brand-top img {
      height: 28px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .form-title {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #d0dce8;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      background: #ffffff;
      border: 1px solid #b0bec5;
      border-radius: 0;
      color: #1a2535;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 2px rgba(30,136,229,0.25);
    }

    input::placeholder { color: #90a4ae; }

    .btn-login {
      width: 100%;
      padding: 9px 14px;
      background: #1565c0;
      border: none;
      border-radius: 0;
      color: white;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .btn-login:hover { background: #1976d2; }
    .btn-login:active { background: #0d47a1; }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: rgba(211, 47, 47, 0.15);
      border-left: 3px solid #e53935;
      color: #ef9a9a;
      padding: 8px 12px;
      font-size: 12px;
      margin-top: 12px;
    }

    /* Right: brand panel */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .brand-center {
      text-align: left;
    }

    .brand-logo {
      height: 52px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      margin-bottom: 18px;
      display: block;
    }

    .brand-logo-fallback {
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-logo-fallback svg {
      width: 52px;
      height: 52px;
      fill: white;
      opacity: 0.9;
    }

    .brand-logo-fallback-text {
      font-size: 42px;
      font-weight: 300;
      color: white;
      letter-spacing: -1px;
    }

    .brand-product {
      font-size: 32px;
      font-weight: 300;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .brand-product strong {
      font-weight: 700;
    }

    .brand-product sup {
      font-size: 14px;
      font-weight: 400;
      vertical-align: super;
      margin-left: 2px;
    }

    .brand-edition {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* 2FA panel */
    .twofa-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .twofa-header .twofa-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .twofa-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .twofa-title {
      font-size: 15px;
      font-weight: 600;
      color: #d0dce8;
    }

    input.totp-input {
      text-align: center;
      font-size: 24px;
      letter-spacing: 10px;
      font-family: 'Courier New', monospace;
      background: #ffffff;
      color: #1a2535;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      cursor: pointer;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }

    /* Version footer */
    .ver-footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 400px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .right-panel { display: none; }
      .left-panel { width: 100%; padding: 40px 32px; }
      .ver-footer { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-wrap">
    <div class="geo geo-1"></div>
    <div class="geo geo-2"></div>
    <div class="geo geo-3"></div>
    <div class="geo geo-4"></div>
    <div class="geo geo-5"></div>
  </div>

  <div class="page">
    <!-- Brand top-left -->
    <div class="brand-top">
      <img src="/static/img/oxware2.png" alt="OXware"
           onerror="this.style.display='none'">
    </div>

    <!-- Left: login form -->
    <div class="left-panel">
      <div class="form-title">OXware Hypervisor Management</div>

      <!-- Login form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">User name</label>
          <input type="text" id="username" name="username"
                 placeholder="" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Log in</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <!-- 2FA panel -->
      <div id="twofa-panel" style="display:none">
        <div class="twofa-header">
          <div class="twofa-icon">🔐</div>
          <div class="twofa-title">Two-Factor Authentication</div>
          <p>Enter the 6-digit code from your authenticator app</p>
        </div>
        <div class="form-group">
          <label for="totp-code">Verification Code</label>
          <input type="text" id="totp-code" class="totp-input"
                 maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                 autocomplete="one-time-code"
                 oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
        <button onclick="doVerify2fa()" class="btn-login" id="verifyBtn">Verify</button>
        <div class="error-msg" id="twofa-errorMsg"></div>
        <a class="back-link" onclick="cancelTwofa()">← Back</a>
      </div>
    </div>

    <!-- Right: brand -->
    <div class="right-panel">
      <div class="brand-center">
        <img class="brand-logo" src="/static/img/oxware2.png" alt="OXware"
             onerror="this.style.display='none'; document.querySelector('.brand-logo-fallback').style.display='flex';">
        <div class="brand-logo-fallback">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7l-8 4-8-4v-7l8-4.32zM12 7a5 5 0 100 10A5 5 0 0012 7zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
          </svg>
          <div class="brand-logo-fallback-text">OXware</div>
        </div>
        <div class="brand-product">
          <strong>OXware</strong><sup>®</sup> Hypervisor<sup>™</sup>
        </div>
        <div class="brand-edition">KVM / QEMU · v2.0.0</div>
      </div>
    </div>

    <div class="ver-footer">OXware Hypervisor v2.0.0</div>
  </div>

  <script>
    let _tempToken = null;

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn   = document.getElementById("loginBtn");
      const errEl = document.getElementById("errorMsg");
      const user  = document.getElementById("username").value.trim();
      const pass  = document.getElementById("password").value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      errEl.style.display = "none";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });
        const data = await res.json();

        if (res.ok && data.requires_2fa) {
          _tempToken = data.temp_token;
          document.getElementById("loginForm").style.display = "none";
          document.getElementById("twofa-panel").style.display = "block";
          setTimeout(() => document.getElementById("totp-code").focus(), 100);
        } else if (res.ok && data.token) {
          localStorage.setItem("oxware_token", data.token);
          localStorage.setItem("oxware_user", data.username);
          localStorage.setItem("oxware_role", data.role || "administrator");
          window.location.href = "/";
        } else {
          errEl.textContent = data.error || "Login failed.";
          errEl.style.display = "block";
        }
      } catch {
        errEl.textContent = "Cannot connect to server.";
        errEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Log in";
      }
    });

    async function doVerify2fa() {
      const code  = document.getElementById("totp-code").value.trim();
      const btn   = document.getElementById("verifyBtn");
      const errEl = document.getElementById("twofa-errorMsg");
      if (code.length !== 6) { errEl.textContent = "Enter 6-digit code."; errEl.style.display = "block"; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying...';
      errEl.style.display = "none";
      try {
        const res = await fetch("/api/auth/2fa/verify-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ temp_token: _tempToken, code }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem("oxware_token", data.token);
          localStorage.setItem("oxware_user", data.username);
          localStorage.setItem("oxware_role", data.role || "administrator");
          window.location.href = "/";
        } else {
          errEl.textContent = data.error || "Invalid code.";
          errEl.style.display = "block";
          document.getElementById("totp-code").value = "";
          document.getElementById("totp-code").focus();
        }
      } catch {
        errEl.textContent = "Cannot connect to server.";
        errEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Verify";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.getElementById("twofa-panel").style.display !== "none") {
        doVerify2fa();
      }
    });

    function cancelTwofa() {
      _tempToken = null;
      document.getElementById("twofa-panel").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("totp-code").value = "";
      document.getElementById("twofa-errorMsg").style.display = "none";
    }

    if (localStorage.getItem("oxware_token") || localStorage.getItem("adaos_token")) {
      window.location.href = "/";
    }
  </script>
</body>
</html>
