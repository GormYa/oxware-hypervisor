Section "Device"
    Identifier "OXwareVideo"
    Driver     "modesetting"
    Option     "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier "OXwareScreen"
    Device     "OXwareVideo"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1024x768" "800x600"
    EndSubSection
EndSection

Section "ServerFlags"
    Option "DontZap" "true"
EndSection
