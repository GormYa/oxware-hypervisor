---
# Erase disk only — OXware tek disk, full-wipe kurulum
efiSystemPartition:        "/boot/efi"
efiSystemPartitionSize:    "300MiB"
efiSystemPartitionName:    "EFI"

userSwapChoices:
    - none
    - small
    - suspend
    - file

drawNestedPartitions:  false
alwaysShowPartitionLabels: true

defaultFileSystemType:  "ext4"

availableFileSystemTypes:  ["ext4", "xfs"]

# Kullanıcıya sadece "Tüm diski sil" seçeneği sun
initialPartitioningChoice: erase

# LVM devre dışı (basit kurulum)
allowManualPartitioning:   false
