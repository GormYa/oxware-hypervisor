---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - oxware_install
  - show:
    - finished

branding: oxware

# Proxmox tarzı: kurulum öncesi onay sor
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true

# Türkçe varsayılan
defaultLocale: "tr_TR.UTF-8"
